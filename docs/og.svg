<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F17"/>
      <stop offset="1" stop-color="#111725"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7C3AED"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#7C3AED" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- badge -->
  <rect x="90" y="96" width="290" height="44" rx="22" fill="#14B8A6" fill-opacity="0.1" stroke="#14B8A6" stroke-opacity="0.3"/>
  <circle cx="118" cy="118" r="6" fill="#34D399"/>
  <text x="138" y="125" font-family="monospace" font-size="20" fill="#5EEAD4">single binary · zero deps</text>

  <!-- title -->
  <text x="88" y="270" font-family="monospace" font-size="150" font-weight="800" fill="url(#grad)">runtui</text>

  <!-- tagline -->
  <text x="90" y="340" font-family="monospace" font-size="40" font-weight="700" fill="#e8edf5">One TUI to run them all.</text>
  <text x="90" y="392" font-family="sans-serif" font-size="27" fill="#94A3B8">Auto-detect your project. List every task. Run it —</text>
  <text x="90" y="428" font-family="sans-serif" font-size="27" fill="#94A3B8">no memorizing command names.</text>

  <!-- mini terminal -->
  <g transform="translate(90,478)">
    <rect width="1020" height="86" rx="12" fill="#0d121d" stroke="#475569"/>
    <circle cx="28" cy="28" r="7" fill="#ff5f57"/>
    <circle cx="52" cy="28" r="7" fill="#febc2e"/>
    <circle cx="76" cy="28" r="7" fill="#28c840"/>
    <text x="110" y="34" font-family="monospace" font-size="18" fill="#64748B">~/my-app</text>
    <text x="28" y="68" font-family="monospace" font-size="20" fill="#14B8A6">→ <tspan fill="#e8edf5" font-weight="700">dev</tspan>  <tspan fill="#475569">next dev</tspan>    <tspan fill="#94A3B8">/</tspan> <tspan fill="#14B8A6">env</tspan><tspan fill="#14B8A6">▏</tspan>   <tspan fill="#34D399" font-weight="700">✓ DONE</tspan> <tspan fill="#475569">exit 0</tspan></text>
  </g>

  <text x="1110" y="130" text-anchor="end" font-family="monospace" font-size="24" fill="#475569">github.com/pedromendonka/runtui</text>
</svg>