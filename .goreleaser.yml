version: 2

builds:
  - binary: runtui
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: runtui
    repository:
      owner: pedromendonka
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/pedromendonka/runtui"
    description: "Interactive TUI for running project tasks"
    license: "MIT"
    install: |
      bin.install "runtui"
    test: |
      system "#{bin}/runtui --version"
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
